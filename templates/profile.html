<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopNet - Profile</title>
    <link rel="stylesheet" href="/static/css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="logo">ShopNet</a>
        </div>
        <div class="nav-right">
            <a href="/" class="nav-item">Home</a>
            <button id="logoutBtn" class="nav-item">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-image">
                    <img id="profileImage" src="https://via.placeholder.com/150" alt="Profile">
                    <button id="changePhotoBtn" class="change-photo-btn">
                        <i class="fas fa-camera"></i>
                    </button>
                    <input type="file" id="photoInput" accept="image/*" style="display: none;">
                </div>
                <h1 id="displayName">Loading...</h1>
                <p id="userEmail">Loading...</p>
            </div>

            <div class="profile-content">
                <div class="profile-section">
                    <h2>Personal Information</h2>
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="name">Display Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone">
                        </div>
                        <button type="submit" class="save-btn">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/profile.js"></script>
</body>
</html>
